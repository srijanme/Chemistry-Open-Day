<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ATOMIC SPRINT | LEADERBOARD</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --poster-blue: #2e90e8; 
            --poster-glow: 0 0 12px rgba(46, 144, 232, 0.5);
            --bg-deep: #050811;
            --panel-bg: rgba(5, 8, 17, 0.85);
            --text-main: #e2e8f0;
            --purple-sector: #a855f7; 
            --needle-color: #38bdf8; 
            --net-color: #fde047; 
            --danger-red: #ef4444;
        }

        body {
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(46, 144, 232, 0.15) 0%, transparent 60%),
                linear-gradient(to bottom, #050811 0%, #000000 100%);
            background-attachment: fixed;
            font-weight: 400; 
        }

        /* --- POSTER-STYLE HEADER --- */
        .poster-header-container {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }
        .poster-header-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            box-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 30px rgba(46, 144, 232, 0.4);
            z-index: 0;
        }
        .title-main {
            font-size: 2.8rem;
            font-weight: 700;
            font-style: italic;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .title-sub {
            font-size: 1.1rem;
            font-weight: 600;
            font-style: italic;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* --- TRAPEZOID SECTION HEADERS --- */
        .section-header-wrapper {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }
        .section-header {
            background: rgba(0,0,0,0.6);
            border-top: 2px solid var(--poster-blue);
            border-bottom: 2px solid var(--poster-blue);
            padding: 6px 40px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            position: relative;
            box-shadow: var(--poster-glow);
        }
        .section-header::before, .section-header::after {
            content: '';
            position: absolute;
            top: -2px;
            width: 20px;
            height: calc(100% + 4px);
            border-top: 2px solid var(--poster-blue);
            border-bottom: 2px solid var(--poster-blue);
            background: rgba(0,0,0,0.6);
        }
        .section-header::before {
            left: -10px;
            transform: skewX(-30deg);
            border-left: 2px solid var(--poster-blue);
            box-shadow: -3px 0 5px rgba(46, 144, 232, 0.3);
        }
        .section-header::after {
            right: -10px;
            transform: skewX(30deg);
            border-right: 2px solid var(--poster-blue);
            box-shadow: 3px 0 5px rgba(46, 144, 232, 0.3);
        }

        /* --- LEADERBOARD GRID --- */
        .leaderboard-container { 
            max-width: 900px; 
            margin: 0 auto 50px; 
            padding: 0 15px; 
        }
        .f1-row {
            display: grid; 
            background: var(--panel-bg); 
            margin-bottom: 12px; 
            height: 70px;
            align-items: center; 
            border: 1.5px solid var(--poster-blue);
            box-shadow: 0 0 10px rgba(46, 144, 232, 0.15), inset 0 0 10px rgba(46, 144, 232, 0.1);
            animation: slideIn 0.3s ease-out; 
            gap: 15px;
            transition: all 0.2s;
        }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .f1-row:hover { 
            box-shadow: var(--poster-glow), inset 0 0 15px rgba(46, 144, 232, 0.2);
            background: rgba(10, 15, 25, 0.95);
        }

        .f1-pos-wrapper {
            color: #fff;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 1.2rem;
            border-right: 1px solid rgba(46, 144, 232, 0.3);
            background: rgba(46, 144, 232, 0.05);
        }
        
        .f1-driver-info { padding-left: 5px; display: flex; flex-direction: column; justify-content: center; }
        .f1-name { font-weight: 600; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; color: #fff; }
        .f1-team { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: 400; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .team-dot { width: 8px; height: 8px; border-radius: 50%; }
        .needle-dot { background: var(--needle-color); box-shadow: 0 0 5px var(--needle-color);}
        .net-dot { background: var(--net-color); box-shadow: 0 0 5px var(--net-color);}

        .f1-time-wrapper {
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 15px;
            font-weight: 400;
            font-size: 1.2rem;
            color: #fff;
            border-left: 1px solid rgba(46, 144, 232, 0.3);
        }
        .fastest-lap { color: var(--purple-sector); text-shadow: 0 0 8px rgba(168, 85, 247, 0.8); font-weight: 600; }
        .f1-crystal { height: 48px; width: 100%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        
        .action-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; padding: 8px; }
        .action-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }
        .action-btn:hover { color: #fff; transform: scale(1.1); filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }

        .delete-btn { color: var(--danger-red); opacity: 0.8; }
        .delete-btn:hover { color: var(--danger-red); opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6)); }

        /* --- ADMIN PANEL --- */
        #admin-panel {
            background: var(--panel-bg); 
            padding: 30px; 
            border: 1.5px solid var(--poster-blue);
            max-width: 860px; 
            margin: 0 auto 40px; 
            display: none; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(46, 144, 232, 0.1);
        }
        .admin-controls { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; margin-bottom: 25px; margin-top: 20px;}
        input, select { padding: 12px 15px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; font-weight: 400; background: rgba(0,0,0,0.8); border: 1px solid rgba(46, 144, 232, 0.4); color: #fff; transition: border-color 0.2s, box-shadow 0.2s;}
        input:focus, select:focus { border-color: var(--poster-blue); outline: none; box-shadow: 0 0 8px rgba(46, 144, 232, 0.3);}
        
        .btn-glow { background: rgba(46, 144, 232, 0.15); border: 1px solid var(--poster-blue); font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.95rem; color: #fff; padding: 0 25px; cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 10px rgba(46, 144, 232, 0.2);}
        .btn-glow:hover { background: rgba(46, 144, 232, 0.3); box-shadow: var(--poster-glow);}
        
        .qr-section { display: flex; justify-content: space-around; background: rgba(0,0,0,0.6); padding: 25px; border: 1px solid rgba(46, 144, 232, 0.2);}
        .qr-box { text-align: center; font-size: 0.85rem; color: #94a3b8; font-weight: 400; line-height: 1.6;}
        .qr-box strong { color: #fff; display: block; margin-bottom: 8px; font-size: 0.95rem; letter-spacing: 1px; font-weight: 600;}
        .qr-box div { background: #fff; padding: 10px; display: inline-block; margin-top: 12px; }

        /* --- CAM PANEL --- */
        #cam-panel { display: none; padding: 20px; text-align: center; height: 100vh; background: var(--bg-deep); }
        .cam-status { font-weight: 400; font-size: 1.2rem; color: #94a3b8; margin-top: 35vh; letter-spacing: 2px;}
        .camera-ui { display: none; margin-top: 15vh; }
        .driver-target { font-size: 2rem; font-weight: 600; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;}
        .shutter-wrapper { position: relative; margin-top: 40px; display: inline-block; width: 100%; max-width: 300px; }
        .shutter-wrapper input { position: absolute; left: 0; top: 0; opacity: 0; height: 100%; width: 100%; cursor: pointer; z-index: 10; }
        .fake-shutter { background: rgba(46, 144, 232, 0.1); color: #fff; padding: 30px 20px; font-weight: 600; font-size: 1.2rem; border: 1.5px solid var(--poster-blue); box-shadow: var(--poster-glow); letter-spacing: 1px; transition: background 0.2s;}
        .shutter-wrapper:active .fake-shutter { background: rgba(46, 144, 232, 0.3); }
        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; font-weight: 400; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; border: 1px dashed rgba(46, 144, 232, 0.4); background: rgba(0,0,0,0.5);}
    </style>
</head>
<body>

    <div class="poster-header-container">
        <div class="title-main">THE ATOMIC SPRINT</div>
        <div class="title-sub">THE NEEDLE VS THE NET</div>
    </div>

    <div id="admin-panel">
        <div class="section-header-wrapper">
            <div class="section-header">PIT WALL COMMAND</div>
        </div>
        <div class="admin-controls">
            <input type="text" id="a-name" placeholder="DRIVER NAME">
            <select id="a-team">
                <option value="needle">TEAM NEEDLE</option>
                <option value="net">TEAM NET</option>
            </select>
            <input type="number" id="a-time" step="0.1" placeholder="TIME (sec)">
            <button class="btn-glow" id="req-photo-btn">REQUEST PHOTO</button>
        </div>
        <div id="admin-status" style="color:var(--poster-blue); margin-bottom: 15px; font-weight: 600; font-size: 0.9rem;"></div>
        
        <div class="qr-section">
            <div class="qr-box">
                <strong>1. CAPTURE THE MOMENT</strong>
                Scan to make your phone the remote.
                <div id="qr-cam"></div>
            </div>
            <div class="qr-box">
                <strong>2. SCAN TO JOIN LEADERBOARD</strong>
                Visitors scan to view and share.
                <div id="qr-public"></div>
            </div>
        </div>
    </div>

    <div id="cam-panel">
        <div id="idle-text" class="cam-status">WAITING FOR LAPTOP...</div>
        <div id="active-cam-ui" class="camera-ui">
            <div style="color:var(--poster-blue); font-weight: 600; font-size: 0.9rem; letter-spacing: 2px;">SNAP CRYSTAL FOR</div>
            <div id="target-name" class="driver-target">---</div>
            <div class="shutter-wrapper">
                <div class="fake-shutter">TAKE A MACRO PHOTO</div>
                <input type="file" id="camera-input" accept="image/*" capture="camera">
            </div>
            <div id="upload-status" style="margin-top: 30px; color: var(--poster-blue); font-weight: 600; font-size: 1rem;"></div>
        </div>
    </div>

    <div id="public-panel" class="leaderboard-container">
        <div class="section-header-wrapper">
            <div class="section-header">RACE TELEMETRY</div>
        </div>
        <div id="leaderboard">
            <div class="empty-state">WAITING FOR FIRST RACER...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // PERMANENT HARDCODED ROOM ID
        let room = urlParams.get('room') || 'atomic_sprint_2026';
        const role = urlParams.get('role') || 'admin';

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic_events = `iisc_events_${room}`;
        const topic_board = `iisc_board_${room}`;
        let masterRacers = []; 

        if (role === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            
            const baseURL = window.location.href.split('?')[0];
            new QRCode(document.getElementById("qr-cam"), { text: `${baseURL}?room=${room}&role=cam`, width: 120, height: 120 });
            new QRCode(document.getElementById("qr-public"), { text: `${baseURL}?room=${room}&role=public`, width: 120, height: 120 });

            const savedData = localStorage.getItem(`iisc_sprint_data_${room}`);
            if (savedData) {
                masterRacers = JSON.parse(savedData);
                renderLeaderboard(masterRacers);
            }

            client.on('connect', () => { 
                client.subscribe(topic_events); 
                client.publish(topic_board, JSON.stringify(masterRacers), { retain: true });
            });

            document.getElementById('req-photo-btn').addEventListener('click', () => {
                const name = document.getElementById('a-name').value;
                const team = document.getElementById('a-team').value;
                const time = document.getElementById('a-time').value;
                if(!name || !time) return alert("Enter Name and Time!");

                document.getElementById('admin-status').innerText = "📡 SIGNAL SENT. OPEN CAMERA ON PHONE...";
                client.publish(topic_events, JSON.stringify({ action: "request_photo", name, team, time }));
            });

            client.on('message', (topic, message) => {
                if (topic === topic_events) {
                    const data = JSON.parse(message.toString());
                    if (data.action === "submit_run") {
                        document.getElementById('a-name').value = '';
                        document.getElementById('a-time').value = '';
                        document.getElementById('admin-status').innerText = "✅ RUN RECORDED!";
                        setTimeout(() => document.getElementById('admin-status').innerText = "", 3000);

                        masterRacers.push(data);
                        masterRacers.sort((a, b) => parseFloat(a.time) - parseFloat(b.time));

                        localStorage.setItem(`iisc_sprint_data_${room}`, JSON.stringify(masterRacers));
                        renderLeaderboard(masterRacers);
                        client.publish(topic_board, JSON.stringify(masterRacers), { retain: true });
                    }
                }
            });
        }
        else if (role === 'cam') {
            document.getElementById('public-panel').style.display = 'none';
            document.getElementById('cam-panel').style.display = 'block';
            client.on('connect', () => { client.subscribe(topic_events); });

            let pendingRun = null;
            client.on('message', (topic, message) => {
                if (topic === topic_events) {
                    const data = JSON.parse(message.toString());
                    if (data.action === "request_photo") {
                        pendingRun = data;
                        document.getElementById('idle-text').style.display = 'none';
                        document.getElementById('target-name').innerText = data.name;
                        document.getElementById('active-cam-ui').style.display = 'block';
                    }
                }
            });

            document.getElementById('camera-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file || !pendingRun) return;

                document.getElementById('upload-status').innerText = "COMPRESSING & BEAMING... 🚀";
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const scale = 400 / img.width;
                        canvas.width = 400; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        client.publish(topic_events, JSON.stringify({
                            action: "submit_run", name: pendingRun.name, team: pendingRun.team, time: pendingRun.time, photo: photoBase64
                        }));

                        document.getElementById('active-cam-ui').style.display = 'none';
                        document.getElementById('idle-text').style.display = 'block';
                        document.getElementById('upload-status').innerText = "";
                        pendingRun = null;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });
        }
        else if (role === 'public') {
            client.on('connect', () => { client.subscribe(topic_board); });
            client.on('message', (topic, message) => {
                if (topic === topic_board) {
                    const currentBoard = JSON.parse(message.toString());
                    renderLeaderboard(currentBoard);
                }
            });
        }

        function renderLeaderboard(dataArray) {
            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            if (dataArray.length === 0) {
                board.innerHTML = '<div class="empty-state">WAITING FOR FIRST RACER...</div>';
                return;
            }
            dataArray.forEach((r, index) => {
                const isFastest = index === 0;
                const row = document.createElement('div');
                row.className = 'f1-row';
                
                // Dynamically adjust grid so the Delete button only takes space on the Admin view
                if(role === 'admin') {
                    row.style.gridTemplateColumns = '50px 1fr 100px 70px 45px 45px 45px';
                } else {
                    row.style.gridTemplateColumns = '50px 1fr 100px 70px 45px 45px';
                }
                
                // Only render the Delete button if you are the Admin
                let adminDeleteBtn = '';
                if(role === 'admin') {
                    adminDeleteBtn = `
                    <button class="action-btn delete-btn" onclick="deleteEntry(${index}, '${r.name}')" title="Delete Run">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                    `;
                }

                row.innerHTML = `
                    <div class="f1-pos-wrapper">P${index + 1}</div>
                    <div class="f1-driver-info">
                        <div class="f1-name">${r.name}</div>
                        <span class="f1-team">
                            <div class="team-dot ${r.team}-dot"></div> 
                            TEAM ${r.team.toUpperCase()}
                        </span>
                    </div>
                    <div class="f1-time-wrapper ${isFastest ? 'fastest-lap' : ''}">
                        ${parseFloat(r.time).toFixed(3)}s
                    </div>
                    <img src="${r.photo}" class="f1-crystal" alt="Crystal Photo">
                    
                    <button class="action-btn" onclick="downloadPhoto('${r.photo}', '${r.name}', '${r.team}')" title="Save to Gallery">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    
                    <button class="action-btn" onclick="shareSocial('${r.name}', '${r.time}', '${r.team}', '${r.photo}')" title="Share via App">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    </button>

                    ${adminDeleteBtn}
                `;
                board.appendChild(row);
            });
        }

        // --- NEW: DELETE ENTRY LOGIC (Admin Only) ---
        window.deleteEntry = function(index, name) {
            if(confirm(`Are you sure you want to delete the run for ${name}?`)) {
                masterRacers.splice(index, 1);
                localStorage.setItem(`iisc_sprint_data_${room}`, JSON.stringify(masterRacers));
                renderLeaderboard(masterRacers);
                client.publish(topic_board, JSON.stringify(masterRacers), { retain: true });
            }
        }

        window.downloadPhoto = function(photoBase64, name, team) {
            const link = document.createElement('a');
            link.href = photoBase64;
            link.download = `AtomicSprint_${name}_${team}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.shareSocial = async function(name, time, team, photoBase64) {
            const text = `🏎️💨 I just set a ${parseFloat(time).toFixed(3)}s time at the Atomic Sprint! \nDriver: ${name} \nTeam: ${team.toUpperCase()} \n#AtomicSprint #IIScOpenDay`;
            
            try {
                const response = await fetch(photoBase64);
                const blob = await response.blob();
                const file = new File([blob], 'atomic_crystal.jpg', { type: 'image/jpeg' });

                const shareData = {
                    title: 'Atomic Sprint Results',
                    text: text,
                    files: [file] 
                };

                if (navigator.canShare && navigator.canShare(shareData)) {
                    await navigator.share(shareData);
                } 
                else if (navigator.share) {
                    await navigator.share({ title: 'Atomic Sprint Results', text: text });
                } 
                else {
                    navigator.clipboard.writeText(text);
                    downloadPhoto(photoBase64, name, team);
                    alert("Caption copied to clipboard and photo saved to your device!"); 
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error("Share failed silently:", err);
                }
            }
        }
    </script>
</body>
</html>
