<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ATOMIC SPRINT | F1 TIMING</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Titillium+Web:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --f1-red: #E10600; 
            --f1-dark: #15151E; 
            --f1-panel: #1e1e27;
            --f1-border: #38383f;
            --f1-text: #ffffff;
            --f1-text-muted: #a0a0a8;
            --purple-sector: #B138FF; 
            --needle-blue: #00D2BE; /* Motorsport Cyan */
            --net-yellow: #FFF500; /* Motorsport Yellow */
        }

        body {
            background-color: #000; 
            color: var(--f1-text); 
            font-family: 'Titillium Web', sans-serif;
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at top right, #1a1a24 0%, #000 60%),
                linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.8) 100%);
            background-attachment: fixed;
        }

        /* --- BROADCAST HEADER --- */
        .f1-header {
            background: linear-gradient(90deg, var(--f1-red) 0%, #a60400 100%);
            padding: 15px 30px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid #000;
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.3);
        }
        .header-title {
            font-size: 2.2rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title .highlight {
            background: #fff;
            color: #000;
            padding: 0 8px;
            border-radius: 2px;
        }
        .header-live {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 8px; height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 8px #00ff00; } }

        /* --- LEADERBOARD GRID --- */
        .leaderboard-container { 
            max-width: 950px; 
            margin: 30px auto; 
            padding: 0 15px; 
        }
        .f1-row {
            display: grid; 
            grid-template-columns: 50px 6px 1fr 100px 70px 45px 45px;
            background: var(--f1-dark); 
            margin-bottom: 6px; 
            height: 65px;
            align-items: center; 
            border-right: 2px solid var(--f1-border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            gap: 8px;
            transition: background 0.2s;
        }
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .f1-row:hover { background: var(--f1-panel); }

        /* Row Elements */
        .f1-pos-wrapper {
            background: #fff;
            color: #000;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .needle-bar { background: var(--needle-blue); height: 100%; }
        .net-bar { background: var(--net-yellow); height: 100%; }
        
        .f1-driver-info { padding-left: 8px; display: flex; flex-direction: column; justify-content: center; }
        .f1-name { 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 1.2rem; 
            letter-spacing: 0.5px;
            line-height: 1.1;
        }
        .f1-team { 
            font-size: 0.7rem; 
            color: var(--f1-text-muted); 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .f1-time-wrapper {
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 12px;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.03);
            border-left: 1px solid var(--f1-border);
        }
        .fastest-lap { 
            background: var(--purple-sector); 
            color: #fff; 
            border-left: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .f1-crystal { 
            height: 45px; 
            width: 100%; 
            object-fit: cover; 
            border-radius: 4px;
            border: 1px solid var(--f1-border);
        }
        
        .action-btn { 
            background: transparent; 
            border: none; 
            color: var(--f1-text-muted); 
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s; 
            padding: 8px;
            border-radius: 4px;
        }
        .action-btn svg { width: 22px; height: 22px; }
        .action-btn:hover { 
            color: #fff; 
            background: rgba(255,255,255,0.1); 
            transform: scale(1.05); 
        }

        /* --- ADMIN & CAM PANELS --- */
        #admin-panel {
            background: var(--f1-dark); 
            padding: 25px; 
            border-top: 4px solid var(--f1-red);
            max-width: 900px; 
            margin: 30px auto; 
            display: none; 
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .admin-header {
            color: #fff;
            font-weight: 700;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr auto; 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        input, select { 
            padding: 12px 15px; 
            font-family: 'Titillium Web', sans-serif; 
            font-size: 1.1rem; 
            font-weight: 600;
            background: #09090d; 
            border: 1px solid var(--f1-border); 
            color: #fff; 
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--f1-red); outline: none; }
        
        .btn-red { 
            background: var(--f1-red); 
            border: none; 
            font-family: 'Titillium Web', sans-serif;
            font-weight: 700; 
            font-size: 1.1rem;
            color: #fff;
            padding: 0 25px;
            border-radius: 4px;
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }
        .btn-red:hover { background: #ff1801; }
        .btn-red:active { transform: scale(0.98); }
        
        .qr-section { 
            display: flex; 
            justify-content: space-around; 
            background: #09090d; 
            padding: 20px; 
            border-radius: 6px;
            border: 1px solid var(--f1-border);
        }
        .qr-box { text-align: center; font-size: 0.9rem; color: var(--f1-text-muted); font-weight: 600;}
        .qr-box strong { color: #fff; display: block; margin-bottom: 5px; font-size: 1rem;}
        .qr-box div { background: #fff; padding: 8px; display: inline-block; margin-top: 10px; border-radius: 4px;}

        #cam-panel { 
            display: none; 
            padding: 20px; 
            text-align: center; 
            height: 100vh; 
            background: var(--f1-dark); 
        }
        .cam-status { font-weight: 700; font-size: 2rem; color: var(--f1-text-muted); margin-top: 35vh; }
        .camera-ui { display: none; margin-top: 15vh; }
        .driver-target { font-size: 3rem; font-weight: 900; color: var(--f1-red); text-transform: uppercase; line-height: 1;}
        
        .shutter-wrapper { position: relative; margin-top: 50px; display: inline-block; width: 100%; max-width: 320px; }
        .shutter-wrapper input { position: absolute; left: 0; top: 0; opacity: 0; height: 100%; width: 100%; cursor: pointer; z-index: 10; }
        .fake-shutter { 
            background: var(--f1-red); 
            color: white; 
            padding: 40px 20px; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 2rem; 
            box-shadow: 0 10px 30px rgba(225,6,0,0.4); 
            border: 4px solid #ff4d48;
            transition: transform 0.2s;
        }
        .shutter-wrapper:active .fake-shutter { transform: scale(0.95); }
        
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: var(--f1-text-muted); 
            font-weight: 600; 
            font-size: 1.5rem; 
            letter-spacing: 1px;
            background: var(--f1-dark);
            border-radius: 4px;
            border: 1px dashed var(--f1-border);
        }
    </style>
</head>
<body>

    <div class="f1-header">
        <div class="header-title">
            ATOMIC <span class="highlight">SPRINT</span>
        </div>
        <div class="header-live">
            <div class="live-dot"></div> LIVE TIMING
        </div>
    </div>

    <div id="admin-panel">
        <h3 class="admin-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            PIT WALL COMMAND
        </h3>
        <div class="admin-controls">
            <input type="text" id="a-name" placeholder="DRIVER NAME">
            <select id="a-team">
                <option value="needle">TEAM NEEDLE</option>
                <option value="net">TEAM NET</option>
            </select>
            <input type="number" id="a-time" step="0.1" placeholder="TIME (sec)">
            <button class="btn-red" id="req-photo-btn">REQUEST PHOTO 📷</button>
        </div>
        <div id="admin-status" style="color:var(--needle-blue); margin-bottom: 15px; font-weight: bold; font-family: 'Roboto Mono';"></div>
        
        <div class="qr-section">
            <div class="qr-box">
                <strong>1. YOUR PHONE (CAMERA)</strong>
                Scan to make your phone the remote.
                <div id="qr-cam"></div>
            </div>
            <div class="qr-box">
                <strong>2. THE CROWD (LEADERBOARD)</strong>
                Visitors scan to view and share.
                <div id="qr-public"></div>
            </div>
        </div>
    </div>

    <div id="cam-panel">
        <div id="idle-text" class="cam-status">WAITING FOR LAPTOP...</div>
        <div id="active-cam-ui" class="camera-ui">
            <div style="color:var(--f1-text-muted); font-weight: 600; font-size: 1.2rem; margin-bottom: 5px;">SNAP CRYSTAL FOR</div>
            <div id="target-name" class="driver-target">---</div>
            <div class="shutter-wrapper">
                <div class="fake-shutter">📷 TAP TO SHOOT</div>
                <input type="file" id="camera-input" accept="image/*" capture="camera">
            </div>
            <div id="upload-status" style="margin-top: 30px; color: var(--needle-blue); font-weight: 700; font-size: 1.2rem; font-family: 'Roboto Mono';"></div>
        </div>
    </div>

    <div id="public-panel" class="leaderboard-container">
        <div id="leaderboard">
            <div class="empty-state">WAITING FOR FIRST RACER...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // PERMANENT HARDCODED ROOM ID
        let room = urlParams.get('room') || 'atomic_sprint_2026';
        const role = urlParams.get('role') || 'admin';

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic_events = `iisc_events_${room}`;
        const topic_board = `iisc_board_${room}`;
        let masterRacers = []; 

        if (role === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            
            const baseURL = window.location.href.split('?')[0];
            new QRCode(document.getElementById("qr-cam"), { text: `${baseURL}?room=${room}&role=cam`, width: 120, height: 120 });
            new QRCode(document.getElementById("qr-public"), { text: `${baseURL}?room=${room}&role=public`, width: 120, height: 120 });

            // LOCAL STORAGE FIX
            const savedData = localStorage.getItem(`iisc_sprint_data_${room}`);
            if (savedData) {
                masterRacers = JSON.parse(savedData);
                renderLeaderboard(masterRacers);
            }

            client.on('connect', () => { 
                client.subscribe(topic_events); 
                client.publish(topic_board, JSON.stringify(masterRacers), { retain: true });
            });

            document.getElementById('req-photo-btn').addEventListener('click', () => {
                const name = document.getElementById('a-name').value;
                const team = document.getElementById('a-team').value;
                const time = document.getElementById('a-time').value;
                if(!name || !time) return alert("Enter Name and Time!");

                document.getElementById('admin-status').innerText = "📡 SIGNAL SENT. OPEN CAMERA ON PHONE...";
                client.publish(topic_events, JSON.stringify({ action: "request_photo", name, team, time }));
            });

            client.on('message', (topic, message) => {
                if (topic === topic_events) {
                    const data = JSON.parse(message.toString());
                    if (data.action === "submit_run") {
                        document.getElementById('a-name').value = '';
                        document.getElementById('a-time').value = '';
                        document.getElementById('admin-status').innerText = "✅ RUN RECORDED!";
                        setTimeout(() => document.getElementById('admin-status').innerText = "", 3000);

                        masterRacers.push(data);
                        masterRacers.sort((a, b) => parseFloat(a.time) - parseFloat(b.time));

                        localStorage.setItem(`iisc_sprint_data_${room}`, JSON.stringify(masterRacers));
                        renderLeaderboard(masterRacers);
                        client.publish(topic_board, JSON.stringify(masterRacers), { retain: true });
                    }
                }
            });
        }
        else if (role === 'cam') {
            document.getElementById('public-panel').style.display = 'none';
            document.getElementById('cam-panel').style.display = 'block';
            client.on('connect', () => { client.subscribe(topic_events); });

            let pendingRun = null;
            client.on('message', (topic, message) => {
                if (topic === topic_events) {
                    const data = JSON.parse(message.toString());
                    if (data.action === "request_photo") {
                        pendingRun = data;
                        document.getElementById('idle-text').style.display = 'none';
                        document.getElementById('target-name').innerText = data.name;
                        document.getElementById('active-cam-ui').style.display = 'block';
                    }
                }
            });

            document.getElementById('camera-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file || !pendingRun) return;

                document.getElementById('upload-status').innerText = "COMPRESSING & BEAMING... 🚀";
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const scale = 400 / img.width;
                        canvas.width = 400; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        client.publish(topic_events, JSON.stringify({
                            action: "submit_run", name: pendingRun.name, team: pendingRun.team, time: pendingRun.time, photo: photoBase64
                        }));

                        document.getElementById('active-cam-ui').style.display = 'none';
                        document.getElementById('idle-text').style.display = 'block';
                        document.getElementById('upload-status').innerText = "";
                        pendingRun = null;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });
        }
        else if (role === 'public') {
            client.on('connect', () => { client.subscribe(topic_board); });
            client.on('message', (topic, message) => {
                if (topic === topic_board) {
                    const currentBoard = JSON.parse(message.toString());
                    renderLeaderboard(currentBoard);
                }
            });
        }

        function renderLeaderboard(dataArray) {
            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            if (dataArray.length === 0) {
                board.innerHTML = '<div class="empty-state">WAITING FOR FIRST RACER...</div>';
                return;
            }
            dataArray.forEach((r, index) => {
                const isFastest = index === 0;
                const row = document.createElement('div');
                row.className = 'f1-row';
                
                // Redesigned F1 Style Row
                row.innerHTML = `
                    <div class="f1-pos-wrapper">${index + 1}</div>
                    <div class="${r.team}-bar"></div>
                    <div class="f1-driver-info">
                        <div class="f1-name">${r.name}</div>
                        <span class="f1-team">${r.team.toUpperCase()} STRATEGY</span>
                    </div>
                    <div class="f1-time-wrapper ${isFastest ? 'fastest-lap' : ''}">
                        ${parseFloat(r.time).toFixed(3)}
                    </div>
                    <img src="${r.photo}" class="f1-crystal" alt="Crystal Photo">
                    
                    <button class="action-btn" onclick="downloadPhoto('${r.photo}', '${r.name}', '${r.team}')" title="Save to Gallery">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    
                    <button class="action-btn" onclick="shareSocial('${r.name}', '${r.time}', '${r.team}', '${r.photo}')" title="Share via App">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    </button>
                `;
                board.appendChild(row);
            });
        }

        // --- NEW: FORCE DOWNLOAD IMAGE TO GALLERY ---
        window.downloadPhoto = function(photoBase64, name, team) {
            const link = document.createElement('a');
            link.href = photoBase64;
            link.download = `AtomicSprint_${name}_${team}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- UPDATED: NATIVE SHARE (SILENT, NO POPUPS) ---
        window.shareSocial = async function(name, time, team, photoBase64) {
            const text = `🏎️💨 I just set a ${parseFloat(time).toFixed(3)}s time at the Atomic Sprint! \nDriver: ${name} \nTeam: ${team.toUpperCase()} \n#AtomicSprint #IIScOpenDay`;
            
            try {
                const response = await fetch(photoBase64);
                const blob = await response.blob();
                const file = new File([blob], 'atomic_crystal.jpg', { type: 'image/jpeg' });

                const shareData = {
                    title: 'Formula Ion Results',
                    text: text,
                    files: [file] 
                };

                // Check if device supports file sharing
                if (navigator.canShare && navigator.canShare(shareData)) {
                    await navigator.share(shareData);
                } 
                // Fallback for browsers supporting text only
                else if (navigator.share) {
                    await navigator.share({ title: 'Formula Ion Results', text: text });
                } 
                // Desktop fallback silently handles it
                else {
                    navigator.clipboard.writeText(text);
                    downloadPhoto(photoBase64, name, team);
                    alert("Caption copied to clipboard and photo saved to your device!"); 
                }
            } catch (err) {
                // If user cancels the share sheet, it throws an AbortError. 
                // We ignore it silently instead of throwing annoying prompts.
                if (err.name !== 'AbortError') {
                    console.error("Share failed silently:", err);
                }
            }
        }
    </script>
</body>
</html>
