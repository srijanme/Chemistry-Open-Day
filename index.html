<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ATOMIC SPRINT | F1 TIMING</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto+Mono:wght@500;700&family=Montserrat:wght@800&display=swap');

        :root {
            --f1-red: #e10600;
            --f1-dark: #15151e;
            --f1-grey: #38383f;
            --purple-sector: #b138ff;
            --needle-blue: #00d4ff;
            --net-yellow: #fff000;
        }

        body {
            background: #000; color: #fff;
            font-family: 'Roboto Mono', monospace;
            margin: 0; padding: 0;
            background-image: radial-gradient(circle at center, #1a1a24 0%, #000 100%);
            min-height: 100vh;
        }

        /* --- THE F1 TIMING TOWER --- */
        .f1-header {
            background: var(--f1-red); padding: 15px 20px;
            font-family: 'Racing Sans One', sans-serif; font-size: 2.5rem;
            text-transform: uppercase; letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .f1-header span.live { font-size: 1rem; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .leaderboard-container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        
        .f1-row {
            display: grid; grid-template-columns: 50px 8px 1fr 100px 80px 50px;
            background: var(--f1-dark); margin-bottom: 4px; height: 60px;
            align-items: center; border-right: 2px solid var(--f1-grey);
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .f1-row:hover { background: #1f1f2c; }
        .f1-pos { text-align: center; font-weight: 700; font-size: 1.2rem; }
        .needle-bar { background: var(--needle-blue); height: 100%; }
        .net-bar { background: var(--net-yellow); height: 100%; }
        
        .f1-name { 
            font-family: 'Montserrat', sans-serif; font-weight: 800; 
            text-transform: uppercase; padding-left: 15px; font-size: 1.1rem; letter-spacing: 1px;
        }
        
        .f1-team { font-size: 0.7rem; color: #888; display: block; font-family: 'Roboto Mono', monospace; font-weight: 500;}
        
        .f1-time { font-size: 1.2rem; font-weight: 700; text-align: right; }
        .fastest-lap { color: var(--purple-sector); text-shadow: 0 0 10px rgba(177, 56, 255, 0.5); }
        
        .f1-crystal { height: 100%; width: 100%; object-fit: cover; border-left: 2px solid #000; }
        
        .share-btn {
            background: transparent; border: none; color: #fff; font-size: 1.5rem;
            cursor: pointer; text-align: center; transition: 0.2s;
        }
        .share-btn:hover { color: var(--f1-red); transform: scale(1.2); }

        /* --- LAPTOP ADMIN PANEL --- */
        #admin-panel {
            background: var(--f1-dark); padding: 20px; border: 2px solid var(--f1-red);
            max-width: 900px; margin: 20px auto; display: none; border-radius: 5px;
        }
        .admin-controls { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 12px; font-family: 'Roboto Mono'; font-size: 1rem; background: #000; border: 1px solid var(--f1-grey); color: #fff; }
        .btn-red { background: var(--f1-red); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-red:hover { background: #ff1801; }
        
        .qr-section { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 5px;}
        .qr-box { text-align: center; font-size: 0.8rem; }
        .qr-box div { background: #fff; padding: 5px; display: inline-block; margin-top: 5px; }

        /* --- PHONE CAMERA REMOTE --- */
        #cam-panel { display: none; padding: 20px; text-align: center; height: 100vh; background: var(--f1-dark); }
        .cam-status { font-family: 'Racing Sans One'; font-size: 2rem; color: #888; margin-top: 40vh; }
        
        .camera-ui { display: none; margin-top: 10vh; }
        .driver-target { font-family: 'Montserrat'; font-size: 2.5rem; font-weight: 800; color: var(--f1-red); text-transform: uppercase;}
        
        .shutter-wrapper { position: relative; margin-top: 40px; display: inline-block; width: 100%; max-width: 300px; }
        .shutter-wrapper input { position: absolute; left: 0; top: 0; opacity: 0; height: 100%; width: 100%; cursor: pointer; }
        .fake-shutter { background: var(--f1-red); color: white; padding: 40px 20px; border-radius: 10px; font-family: 'Racing Sans One'; font-size: 2rem; box-shadow: 0 10px 30px rgba(225,6,0,0.5); }
    </style>
</head>
<body>

    <div id="app">
        <div class="f1-header">
            <div>ATOMIC <span style="color:#000; background:#fff; padding: 0 5px;">SPRINT</span></div>
            <span class="live">● LIVE TIMING</span>
        </div>

        <div id="admin-panel">
            <h3 style="margin-top:0; color:var(--f1-red); font-family:'Racing Sans One';">PIT WALL COMMAND</h3>
            <div class="admin-controls">
                <input type="text" id="a-name" placeholder="DRIVER NAME">
                <select id="a-team">
                    <option value="needle">TEAM NEEDLE</option>
                    <option value="net">TEAM NET</option>
                </select>
                <input type="number" id="a-time" step="0.1" placeholder="TIME (sec)">
                <button class="btn-red" id="req-photo-btn">REQUEST PHOTO FROM PHONE 📷</button>
            </div>
            <div id="admin-status" style="color:var(--needle-blue); margin-bottom: 10px; font-weight: bold;"></div>
            
            <div class="qr-section">
                <div class="qr-box">
                    <strong>1. YOUR PHONE (CAMERA)</strong><br>Scan this to make your phone the remote shutter.<br>
                    <div id="qr-cam"></div>
                </div>
                <div class="qr-box">
                    <strong>2. THE CROWD (LEADERBOARD)</strong><br>Visitors scan this to view and share.<br>
                    <div id="qr-public"></div>
                </div>
            </div>
        </div>

        <div id="cam-panel">
            <div id="idle-text" class="cam-status">WAITING FOR LAPTOP...</div>
            
            <div id="active-cam-ui" class="camera-ui">
                <div style="color:#888;">SNAP CRYSTAL FOR</div>
                <div id="target-name" class="driver-target">---</div>
                
                <div class="shutter-wrapper">
                    <div class="fake-shutter">📷 TAP TO SHOOT</div>
                    <input type="file" id="camera-input" accept="image/*" capture="camera">
                </div>
                <div id="upload-status" style="margin-top: 20px; color: var(--needle-blue); font-weight: bold;"></div>
            </div>
        </div>

        <div id="public-panel" class="leaderboard-container">
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');
        const role = urlParams.get('role') || 'admin'; // admin, cam, public

        if (!room && role === 'admin') {
            room = 'gp_' + Math.random().toString(36).substring(2, 8);
            window.location.href = `?room=${room}&role=admin`;
        }

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic = `iisc_atomic_sprint_${room}`;
        let racers = [];
        let pendingRun = null; // Holds data on the phone while taking photo

        client.on('connect', () => { client.subscribe(topic); });

        // --- ROLE ROUTING ---
        if (role === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            
            // Generate QRs
            const baseURL = window.location.href.split('?')[0];
            new QRCode(document.getElementById("qr-cam"), { text: `${baseURL}?room=${room}&role=cam`, width: 120, height: 120 });
            new QRCode(document.getElementById("qr-public"), { text: `${baseURL}?room=${room}&role=public`, width: 120, height: 120 });

            // Step 2: Laptop requests photo
            document.getElementById('req-photo-btn').addEventListener('click', () => {
                const name = document.getElementById('a-name').value;
                const team = document.getElementById('a-team').value;
                const time = document.getElementById('a-time').value;

                if(!name || !time) return alert("Enter Name and Time!");

                document.getElementById('admin-status').innerText = "📡 SIGNAL SENT. OPEN CAMERA ON PHONE...";
                
                // Tell the phone to wake up
                client.publish(topic, JSON.stringify({ action: "request_photo", name, team, time }));
            });

        } else if (role === 'cam') {
            document.getElementById('public-panel').style.display = 'none'; // Hide leaderboard on camera phone
            document.getElementById('cam-panel').style.display = 'block';

            // Step 3: Phone processes the photo
            document.getElementById('camera-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file || !pendingRun) return;

                document.getElementById('upload-status').innerText = "COMPRESSING & BEAMING... 🚀";

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const scale = 400 / img.width;
                        canvas.width = 400; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        // Submit the final run to the leaderboard
                        client.publish(topic, JSON.stringify({
                            action: "submit_run",
                            name: pendingRun.name,
                            team: pendingRun.team,
                            time: pendingRun.time,
                            photo: photoBase64
                        }));

                        // Reset Camera UI
                        document.getElementById('active-cam-ui').style.display = 'none';
                        document.getElementById('idle-text').style.display = 'block';
                        document.getElementById('upload-status').innerText = "";
                        pendingRun = null;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });
        }

        // --- GLOBAL MESSAGE HANDLER (Builds the Leaderboard) ---
        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());

            if (data.action === "request_photo" && role === 'cam') {
                // Wake up the camera UI
                pendingRun = data;
                document.getElementById('idle-text').style.display = 'none';
                document.getElementById('target-name').innerText = data.name;
                document.getElementById('active-cam-ui').style.display = 'block';
            }

            if (data.action === "submit_run") {
                if (role === 'admin') {
                    // Reset laptop inputs
                    document.getElementById('a-name').value = '';
                    document.getElementById('a-time').value = '';
                    document.getElementById('admin-status').innerText = "✅ RUN RECORDED!";
                    setTimeout(() => document.getElementById('admin-status').innerText = "", 3000);
                }

                // Add to array and sort (Fastest Lap)
                racers.push(data);
                racers.sort((a, b) => parseFloat(a.time) - parseFloat(b.time));
                renderLeaderboard();
            }
        });

        // --- RENDER THE F1 TOWER ---
        function renderLeaderboard() {
            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            
            racers.forEach((r, index) => {
                const isFastest = index === 0;
                const row = document.createElement('div');
                row.className = 'f1-row';
                row.innerHTML = `
                    <div class="f1-pos">${index + 1}</div>
                    <div class="${r.team}-bar"></div>
                    <div>
                        <div class="f1-name">${r.name}</div>
                        <span class="f1-team">${r.team.toUpperCase()} STRATEGY</span>
                    </div>
                    <div class="f1-time ${isFastest ? 'fastest-lap' : ''}">${parseFloat(r.time).toFixed(3)}s</div>
                    <img src="${r.photo}" class="f1-crystal">
                    <button class="share-btn" onclick="shareSocial('${r.name}', '${r.time}', '${r.team}')">📤</button>
                `;
                board.appendChild(row);
            });
        }

        // --- CROWD SHARING ---
        window.shareSocial = function(name, time, team) {
            const text = `🏎️💨 I just set a ${time}s time at the IISc Atomic Sprint! \nDriver: ${name} \nTeam: ${team.toUpperCase()} \n#AtomicSprint #IIScOpenDay`;
            if(navigator.share) {
                navigator.share({ title: 'Formula Ion Results', text: text });
            } else {
                prompt("Copy this to share on social media:", text);
            }
        }
    </script>
</body>
</html>
